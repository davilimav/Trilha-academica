<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Trilha Acadêmica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #166534;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 2px rgba(22,163,74,0.2);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #16a34a;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #15803d;
    }

    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .error {
      font-size: 12px;
      color: #dc2626;
      margin-top: 4px;
      display: none;
    }

    .success {
      background: #d1fae5;
      color: #065f46;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .footer a {
      color: #16a34a;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .container {
        margin: 20px;
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Criar Conta</h2>

    <div id="successMessage" class="success"></div>

    <form id="formCadastro">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Seu nome">
        <div class="error" id="erroNome">Digite seu nome</div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@exemplo.com">
        <div class="error" id="erroEmail">Email inválido</div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="********">
        <div class="error" id="erroSenha">Mínimo 6 caracteres</div>
      </div>

      <button type="submit" class="btn" id="btnCadastrar">Cadastrar</button>
    </form>

    <div class="footer">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api/auth';

    const form = document.getElementById('formCadastro');
    const btnCadastrar = document.getElementById('btnCadastrar');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      let valid = true;

      const nome = document.getElementById('nome');
      const email = document.getElementById('email');
      const senha = document.getElementById('senha');

      const erroNome = document.getElementById('erroNome');
      const erroEmail = document.getElementById('erroEmail');
      const erroSenha = document.getElementById('erroSenha');

      erroNome.style.display = 'none';
      erroEmail.style.display = 'none';
      erroSenha.style.display = 'none';
      successMessage.style.display = 'none';

      if (nome.value.trim() === '') {
        erroNome.style.display = 'block';
        valid = false;
      }

      if (!email.value.includes('@') || !email.value.includes('.')) {
        erroEmail.style.display = 'block';
        valid = false;
      }

      if (senha.value.length < 6) {
        erroSenha.style.display = 'block';
        valid = false;
      }

      if (!valid) return;

      // Enviar para o backend
      btnCadastrar.disabled = true;
      btnCadastrar.innerHTML = '<span class="loading"></span> Cadastrando...';

      try {
        const response = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: nome.value.trim(),
            email: email.value.trim(),
            password: senha.value
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          successMessage.style.display = 'block';
          successMessage.innerHTML = '✓ Cadastro realizado com sucesso! Redirecionando...';
          form.reset();
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          // Exibir erro do backend
          const errorDiv = document.createElement('div');
          errorDiv.className = 'error';
          errorDiv.style.display = 'block';
          errorDiv.style.backgroundColor = '#fee2e2';
          errorDiv.style.padding = '10px';
          errorDiv.style.borderRadius = '8px';
          errorDiv.style.marginBottom = '15px';
          errorDiv.innerHTML = data.error || 'Erro ao cadastrar';
          
          form.insertBefore(errorDiv, form.firstChild);
          setTimeout(() => errorDiv.remove(), 3000);
        }
      } catch (error) {
        console.error('Erro:', error);
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error';
        errorDiv.style.display = 'block';
        errorDiv.style.backgroundColor = '#fee2e2';
        errorDiv.style.padding = '10px';
        errorDiv.style.borderRadius = '8px';
        errorDiv.style.marginBottom = '15px';
        errorDiv.innerHTML = 'Erro de conexão com o servidor';
        
        form.insertBefore(errorDiv, form.firstChild);
        setTimeout(() => errorDiv.remove(), 3000);
      } finally {
        btnCadastrar.disabled = false;
        btnCadastrar.innerHTML = 'Cadastrar';
      }
    });
  </script>

</body>
</html>
