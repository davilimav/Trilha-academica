<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - Trilha Acadêmica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/trilha-global.css">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-primaria-clara));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cadastro-container {
            background: white;
            padding: 40px;
            border-radius: var(--borda-raio-lg);
            width: 100%;
            max-width: 420px;
            box-shadow: var(--sombra-forte);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cadastro-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--cor-primaria-escura);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--texto-secundario);
        }

        .error {
            font-size: 12px;
            color: var(--cor-vermelho);
            margin-top: 4px;
            display: none;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .footer a {
            color: var(--cor-primaria);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="cadastro-container">
        <h2>Criar Conta</h2>
        <div id="successMessage" class="success"></div>
        <form id="formCadastro">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nome" class="input-padrao" placeholder="Seu nome">
                <div class="error" id="erroNome">Digite seu nome</div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="input-padrao" placeholder="email@exemplo.com">
                <div class="error" id="erroEmail">Email inválido</div>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" class="input-padrao" placeholder="********">
                <div class="error" id="erroSenha">Mínimo 6 caracteres</div>
            </div>
            <button type="submit" class="btn-primario" style="width: 100%;" id="btnCadastrar">Cadastrar</button>
        </form>
        <div class="footer">Já tem conta? <a href="login.html">Entrar</a></div>
    </div>
    <script>
        const API_URL = 'https://trilha-academica-api.onrender.com/api/auth';
        const form = document.getElementById('formCadastro');
        const btnCadastrar = document.getElementById('btnCadastrar');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            let valid = true;
            const nome = document.getElementById('nome');
            const email = document.getElementById('email');
            const senha = document.getElementById('senha');

            document.getElementById('erroNome').style.display = 'none';
            document.getElementById('erroEmail').style.display = 'none';
            document.getElementById('erroSenha').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            if (nome.value.trim() === '') { document.getElementById('erroNome').style.display = 'block'; valid = false; }
            if (!email.value.includes('@') || !email.value.includes('.')) { document.getElementById('erroEmail').style.display = 'block'; valid = false; }
            if (senha.value.length < 6) { document.getElementById('erroSenha').style.display = 'block'; valid = false; }
            if (!valid) return;

            btnCadastrar.disabled = true;
            btnCadastrar.innerHTML = 'Cadastrando...';

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nome.value.trim(), email: email.value.trim(), password: senha.value })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('successMessage').innerHTML = '✅ Cadastro realizado! Redirecionando...';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    alert(data.error || 'Erro ao cadastrar');
                }
            } catch (error) {
                alert('Erro de conexão');
            } finally {
                btnCadastrar.disabled = false;
                btnCadastrar.innerHTML = 'Cadastrar';
            }
        });
    </script>
</body>

</html>
