<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha - Trilha Acadêmica</title>
</head>
<body>
    <h1>Trilha Acadêmica</h1>
    <h2>Recuperar Senha</h2>
    
    <div id="message"></div>
    
    <form id="recuperarForm">
        <div>
            <label>Email cadastrado:</label><br>
            <input type="email" id="email" required style="width: 300px; padding: 8px;">
        </div>
        <br>
        <button type="submit" style="padding: 10px 30px;">Enviar</button>
    </form>
    
    <br>
    <a href="login.html">Voltar para login</a>
    
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('recuperarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            const result = await solicitarRecuperacao(email);
            
            if (result.success) {
                document.getElementById('message').innerHTML = 
                    '<p style="color: green;">' + result.message + '</p>';
            } else {
                document.getElementById('message').innerHTML = 
                    '<p style="color: red;">' + result.error + '</p>';
            }
        });
    </script>
</body>
</html>
