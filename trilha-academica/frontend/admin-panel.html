<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Trilha Acadêmica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/trilha-global.css">
    <style>
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: var(--borda-raio-lg);
            padding: 25px;
            text-align: center;
            box-shadow: var(--sombra-suave);
        }

        .stat-card h3 {
            font-size: 32px;
            color: var(--cor-primaria);
            margin-bottom: 10px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: var(--borda-raio-lg);
            padding: 20px;
            box-shadow: var(--sombra-suave);
        }

        .tabela-usuarios {
            background: white;
            border-radius: var(--borda-raio-lg);
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f3f4f6;
            font-weight: 600;
        }

        .btn-admin-sair {
            background: var(--cor-vermelho);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--texto-secundario);
        }

        .erro-acesso {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 16px;
            margin: 40px auto;
            max-width: 500px;
        }

        .erro-acesso h2 {
            color: var(--cor-vermelho);
            margin-bottom: 20px;
        }

        .erro-acesso p {
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {

            .stats-grid,
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="adminPanel" style="display: none;">
        <div class="admin-header">
            <div style="font-size: 20px; font-weight: bold;">🎓 Trilha Acadêmica - Admin</div>
            <button class="btn-admin-sair" onclick="sair()">Sair</button>
        </div>

        <div class="admin-container">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3 id="totalUsuarios">-</h3>
                    <p>Usuários</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalQuestionarios">-</h3>
                    <p>Questionários</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalEspecializacoes">-</h3>
                    <p>Especializações</p>
                </div>
                <div class="stat-card">
                    <h3 id="usuariosAtivos">-</h3>
                    <p>Ativos (30d)</p>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <h3>📊 Top Especializações</h3>
                    <canvas id="topEspecChart" style="max-height: 300px;"></canvas>
                </div>
                <div class="chart-card">
                    <h3>🎯 Nível Médio por Área</h3>
                    <canvas id="nivelMedioChart" style="max-height: 300px;"></canvas>
                </div>
            </div>

            <div class="tabela-usuarios">
                <h3>📋 Últimos Usuários</h3>
                <div id="tabelaUsuarios" class="loading">Carregando usuários...</div>
            </div>
        </div>
    </div>

    <div id="erroAcesso" class="erro-acesso" style="display: none;">
        <h2>⛔ Acesso Negado</h2>
        <p>Você não tem permissão para acessar esta área.</p>
        <button class="btn-primario" onclick="window.location.href='dashboard.html'">Voltar para o Dashboard</button>
    </div>

    <script>
        // =====================================================
        // VARIÁVEIS GLOBAIS (DECLARAR PRIMEIRO!)
        // =====================================================
        const API_URL = 'https://trilha-academica-api.onrender.com/api';
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || '{}');
        let topEspecChart, nivelMedioChart;

        // =====================================================
        // VERIFICAÇÃO DE ACESSO
        // =====================================================
        if (!token) {
            window.location.href = 'login.html';
        }

        // Mostrar painel
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('erroAcesso').style.display = 'none';

        // =====================================================
        // FUNÇÕES
        // =====================================================
        async function carregarDadosAdmin() {
            await carregarStats();
            await carregarTopEspecializacoes();
            await carregarNivelMedio();
        }

        async function carregarStats() {
            try {
                const response = await fetch(`${API_URL}/admin/dashboard/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                document.getElementById('totalUsuarios').textContent = data.total_usuarios || 0;
                document.getElementById('totalQuestionarios').textContent = data.total_questionarios || 0;
                document.getElementById('totalEspecializacoes').textContent = data.total_especializacoes || 0;
                document.getElementById('usuariosAtivos').textContent = data.usuarios_ativos_30d || 0;
            } catch (error) {
                console.error('Erro stats:', error);
                document.getElementById('statsGrid').innerHTML = '<div class="loading">Erro ao carregar estatísticas</div>';
            }
        }

        async function carregarTopEspecializacoes() {
            try {
                const response = await fetch(`${API_URL}/admin/dashboard/top-especializacoes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (topEspecChart) topEspecChart.destroy();

                const ctx = document.getElementById('topEspecChart').getContext('2d');
                topEspecChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.especializacao?.substring(0, 20) || d.curso_nome?.substring(0, 20) || 'N/A'),
                        datasets: [{
                            label: 'Total',
                            data: data.map(d => d.total || 0),
                            backgroundColor: '#16a34a',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { position: 'top' } }
                    }
                });
            } catch (error) {
                console.error('Erro gráfico:', error);
            }
        }

        async function carregarNivelMedio() {
            try {
                const response = await fetch(`${API_URL}/admin/dashboard/niveis-medios`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (nivelMedioChart) nivelMedioChart.destroy();

                const ctx = document.getElementById('nivelMedioChart').getContext('2d');
                nivelMedioChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Programação', 'Dados', 'Design', 'Segurança', 'Marketing'],
                        datasets: [{
                            label: 'Nível Médio',
                            data: [
                                data.programacao || 0,
                                data.dados || 0,
                                data.design || 0,
                                data.seguranca || 0,
                                data.marketing || 0
                            ],
                            backgroundColor: 'rgba(22, 163, 74, 0.2)',
                            borderColor: '#16a34a',
                            borderWidth: 2,
                            pointBackgroundColor: '#16a34a'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: { r: { beginAtZero: true, max: 3 } }
                    }
                });
            } catch (error) {
                console.error('Erro radar:', error);
            }
        }

        async function carregarUsuarios() {
            try {
                const response = await fetch(`${API_URL}/admin/usuarios`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                const container = document.getElementById('tabelaUsuarios');
                if (!data || data.length === 0) {
                    container.innerHTML = '<p>Nenhum usuário cadastrado</p>';
                    return;
                }

                container.innerHTML = `
                <table style="width:100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #f3f4f6;">
                            <th style="padding: 12px; text-align: left;">ID</th>
                            <th style="padding: 12px; text-align: left;">Nome</th>
                            <th style="padding: 12px; text-align: left;">Email</th>
                            <th style="padding: 12px; text-align: left;">Curso</th>
                            <th style="padding: 12px; text-align: left;">Prog</th>
                            <th style="padding: 12px; text-align: left;">Dados</th>
                            <th style="padding: 12px; text-align: left;">Design</th>
                            <th style="padding: 12px; text-align: left;">Cursos</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(u => `
                            <tr style="border-bottom: 1px solid #e5e7eb;">
                                <td style="padding: 12px;">${u.id}</td>
                                <td style="padding: 12px;">${u.name || '-'}</td>
                                <td style="padding: 12px;">${u.email || '-'}</td>
                                <td style="padding: 12px;">${u.curso || '-'}</td>
                                <td style="padding: 12px;">${u.programacao_nivel || 0}</td>
                                <td style="padding: 12px;">${u.dados_nivel || 0}</td>
                                <td style="padding: 12px;">${u.design_nivel || 0}</td>
                                <td style="padding: 12px;">${u.total_cursos || u.total_especializacoes || 0}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('tabelaUsuarios').innerHTML = '<div class="loading">Erro ao carregar usuários</div>';
            }
        }

        function sair() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // =====================================================
        // INICIAR
        // =====================================================
        carregarDadosAdmin();
        carregarUsuarios();
    </script>
</body>

</html>
