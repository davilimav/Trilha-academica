<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Login - Trilha Acadêmica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/trilha-global.css">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, var(--cor-primaria), var(--cor-primaria-clara));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: var(--borda-raio-lg);
            width: 100%;
            max-width: 420px;
            box-shadow: var(--sombra-forte);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--cor-primaria-escura);
        }

        .error-message {
            background: #fee2e2;
            color: var(--cor-vermelho);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--texto-secundario);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .footer a {
            color: var(--cor-primaria);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Bem-vindo</h2>
        <div id="errorMessage" class="error-message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="input-padrao" placeholder="email@exemplo.com"
                    autocomplete="email">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" class="input-padrao" placeholder="********"
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primario" style="width: 100%;">Entrar</button>
        </form>
        <div class="footer">
            <a href="cadastro.html">Criar conta</a>
            <span style="margin: 0 8px;">|</span>
            <a href="recuperar.html">Esqueci minha senha</a>
        </div>
    </div>
    <script>
        const API_URL = 'https://trilha-academica-api.onrender.com/api/auth';
        const form = document.getElementById('loginForm');
        const btnLogin = document.querySelector('.btn-primario');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            if (!email || !senha) {
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = 'Preencha todos os campos';
                return;
            }

            errorMessage.style.display = 'none';
            btnLogin.disabled = true;
            btnLogin.innerHTML = '⏳ Entrando...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: senha })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Salvar dados
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    console.log('Usuário logado:', data.user);
                    console.log('is_admin:', data.user.is_admin);

                    // ✅ REDIRECIONAMENTO CORRIGIDO
                    // Verifica se é admin pelo campo is_admin
                    if (data.user.is_admin === true || data.user.is_admin === 1) {
                        window.location.href = 'admin-panel.html';
                    }
                    // Se respondeu questionário, vai para dashboard
                    else if (data.user.questionario_respondido === true) {
                        window.location.href = 'dashboard.html';
                    }
                    // Senão, vai para questionário
                    else {
                        window.location.href = 'questionario.html';
                    }
                } else {
                    errorMessage.style.display = 'block';
                    errorMessage.innerHTML = data.error || 'Email ou senha inválidos';
                }
            } catch (error) {
                console.error('Erro:', error);
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = 'Erro de conexão com o servidor';
            } finally {
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Entrar';
            }
        });
    </script>
</body>

</html>
