<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Meu Currículo - Trilha Acadêmica</title>
    <link rel="stylesheet" href="css/trilha-global.css">
    <style>
        body {
            background: #f3f4f6;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .curriculo-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .cabecalho {
            text-align: center;
            border-bottom: 2px solid #16a34a;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #16a34a;
        }

        .secao {
            margin-bottom: 30px;
        }

        .secao h2 {
            color: #16a34a;
            margin-bottom: 15px;
            border-left: 4px solid #16a34a;
            padding-left: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .campo {
            margin-bottom: 10px;
        }

        .campo label {
            font-weight: 600;
            color: #374151;
            display: block;
            font-size: 12px;
            text-transform: uppercase;
        }

        .campo input,
        .campo select,
        .campo textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        .curso-item {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-baixar {
            background: #16a34a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }

        .btn-editar {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="curriculo-card" id="curriculoContainer">
            <div class="cabecalho">
                <img id="fotoPerfil" class="foto-perfil" src="https://via.placeholder.com/120" alt="Foto">
                <h1 id="nomeUsuario">Carregando...</h1>
                <p id="emailUsuario">carregando@email.com</p>
            </div>

            <div class="secao">
                <h2>📋 Informações Pessoais</h2>
                <div class="info-grid" id="infoPessoais"></div>
                <button class="btn-editar" onclick="editarInfo()">✏️ Editar informações</button>
            </div>

            <div class="secao">
                <h2>🎓 Formação Acadêmica</h2>
                <div id="formacao"></div>
            </div>

            <div class="secao">
                <h2>✅ Cursos Concluídos</h2>
                <div id="cursosConcluidos"></div>
            </div>

            <div class="secao">
                <h2>🏆 Conquistas</h2>
                <div id="conquistas"></div>
            </div>

            <div class="secao">
                <h2>📊 Estatísticas</h2>
                <div id="estatisticas"></div>
            </div>

            <button class="btn-baixar" onclick="baixarCurriculo()">
                📄 Baixar Currículo (PDF)
            </button>
        </div>
    </div>

    <!-- Modal de edição -->
    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <h3>Editar Perfil</h3>
            <form id="formEditar">
                <div class="campo"><label>Nome completo</label><input type="text" id="editNome" required></div>
                <div class="campo"><label>Telefone</label><input type="tel" id="editTelefone"></div>
                <div class="campo"><label>Idade</label><input type="number" id="editIdade"></div>
                <div class="campo"><label>Cidade</label><input type="text" id="editCidade"></div>
                <div class="campo"><label>Estado</label><input type="text" id="editEstado" maxlength="2"></div>
                <div class="campo"><label>Faculdade/Universidade</label><input type="text" id="editFaculdade"></div>
                <div class="campo"><label>Semestre atual</label><input type="number" id="editSemestre"></div>
                <div class="campo"><label>Bio / Sobre mim</label><textarea id="editBio" rows="3"></textarea></div>
                <button type="submit" class="btn-primario" style="width: 100%;">Salvar alterações</button>
                <button type="button" class="btn-outline" onclick="fecharModal()"
                    style="width: 100%; margin-top: 10px;">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const API_URL = 'https://trilha-academica-api.onrender.com/api';
        const token = localStorage.getItem('token');
        let userData = {};

        if (!token) window.location.href = 'login.html';

        async function carregarDados() {
            await carregarPerfil();
            await carregarProgresso();
        }

        async function carregarPerfil() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                userData = data.user;

                console.log('📋 Dados do usuário carregados:', userData);

                document.getElementById('nomeUsuario').textContent = userData.name;
                document.getElementById('emailUsuario').textContent = userData.email;
                if (userData.foto_url) {
                    document.getElementById('fotoPerfil').src = userData.foto_url + '?t=' + Date.now();
                }

                document.getElementById('infoPessoais').innerHTML = `
                    <div><label>Telefone</label><p>${userData.telefone || 'Não informado'}</p></div>
                    <div><label>Idade</label><p>${userData.idade || 'Não informado'}</p></div>
                    <div><label>Cidade/UF</label><p>${userData.cidade || ''} ${userData.estado ? `/${userData.estado}` : 'Não informado'}</p></div>
                    <div><label>Faculdade</label><p>${userData.faculdade || 'Não informado'}</p></div>
                    <div><label>Semestre</label><p>${userData.semestre || 'Não informado'}</p></div>
                    <div><label>Bio</label><p>${userData.bio || 'Estudante em busca de conhecimento'}</p></div>
                `;

                document.getElementById('formacao').innerHTML = userData.faculdade ? `
                    <div class="curso-item">
                        <div><strong>${userData.faculdade}</strong><br>${userData.semestre ? `${userData.semestre}º semestre` : ''}</div>
                    </div>
                ` : '<p>Nenhuma formação cadastrada</p>';

            } catch (error) {
                console.error('Erro ao carregar perfil:', error);
            }
        }

        async function carregarProgresso() {
            try {
                const response = await fetch(`${API_URL}/progresso/meu-progresso`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                document.getElementById('cursosConcluidos').innerHTML = data.cursos_concluidos?.length ?
                    data.cursos_concluidos.map(c => `
                        <div class="curso-item">
                            <div><strong>${c.curso_nome}</strong><br>Concluído em ${new Date(c.data_conclusao).toLocaleDateString()}</div>
                            <span>✅</span>
                        </div>
                    `).join('') : '<p>Nenhum curso concluído ainda</p>';

                document.getElementById('conquistas').innerHTML = data.conquistas?.length ?
                    data.conquistas.map(c => `
                        <div class="curso-item">
                            <div><strong>🏆 ${c.conquista_nome}</strong><br>${c.conquista_descricao}</div>
                            <span>+${c.pontos_ganhos} pts</span>
                        </div>
                    `).join('') : '<p>Conclua cursos para ganhar conquistas!</p>';

                document.getElementById('estatisticas').innerHTML = `
                    <div class="curso-item">
                        <div><strong>⭐ Pontos totais</strong></div>
                        <div>${data.progresso?.pontos_total || 0}</div>
                    </div>
                    <div class="curso-item">
                        <div><strong>⏱️ Horas estudadas</strong></div>
                        <div>${data.progresso?.horas_estudadas || 0}h</div>
                    </div>
                    <div class="curso-item">
                        <div><strong>📚 Cursos concluídos</strong></div>
                        <div>${data.cursos_concluidos?.length || 0}</div>
                    </div>
                    <div class="curso-item">
                        <div><strong>🎯 Nível atual</strong></div>
                        <div>${data.progresso?.nivel_atual === 1 ? '🌱 Iniciante' : data.progresso?.nivel_atual === 2 ? '📘 Intermediário' : '🚀 Avançado'}</div>
                    </div>
                `;

            } catch (error) {
                console.error('Erro ao carregar progresso:', error);
            }
        }

        function editarInfo() {
            document.getElementById('editNome').value = userData.name || '';
            document.getElementById('editTelefone').value = userData.telefone || '';
            document.getElementById('editIdade').value = userData.idade || '';
            document.getElementById('editCidade').value = userData.cidade || '';
            document.getElementById('editEstado').value = userData.estado || '';
            document.getElementById('editFaculdade').value = userData.faculdade || '';
            document.getElementById('editSemestre').value = userData.semestre || '';
            document.getElementById('editBio').value = userData.bio || '';
            document.getElementById('modalEditar').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalEditar').style.display = 'none';
        }

        document.getElementById('formEditar').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                name: document.getElementById('editNome').value,
                telefone: document.getElementById('editTelefone').value,
                idade: document.getElementById('editIdade').value,
                cidade: document.getElementById('editCidade').value,
                estado: document.getElementById('editEstado').value,
                faculdade: document.getElementById('editFaculdade').value,
                semestre: document.getElementById('editSemestre').value,
                bio: document.getElementById('editBio').value
            };

            console.log('📤 Enviando dados:', dados);

            try {
                const response = await fetch(`${API_URL}/auth/perfil`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();
                console.log('📥 Resposta do servidor:', result);

                if (response.ok && result.success) {
                    alert('✅ Perfil atualizado com sucesso!');
                    fecharModal();

                    // Atualizar localStorage com os novos dados
                    const userSalvo = JSON.parse(localStorage.getItem('user') || '{}');
                    userSalvo.name = dados.name;
                    localStorage.setItem('user', JSON.stringify(userSalvo));

                    // Recarregar dados
                    await carregarDados();
                } else {
                    alert('❌ Erro: ' + (result.error || 'Não foi possível atualizar o perfil'));
                }
            } catch (error) {
                console.error('❌ Erro na requisição:', error);
                alert('❌ Erro de conexão com o servidor. Verifique se o servidor está rodando.');
            }
        });

        function baixarCurriculo() {
            const element = document.getElementById('curriculoContainer');
            const opt = {
                margin: 1,
                filename: `curriculo_${userData.name?.replace(/ /g, '_') || 'usuario'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Iniciar
        carregarDados();
    </script>
</body>

</html>
