<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Autenticação de Duas Etapas - Trilha Acadêmica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/autenticacao-duas-etapas.css">
</head>
<body>

  <div class="container">
    <h2>Autenticação de Duas Etapas</h2>

    <div class="info">
      Digite o código de 6 dígitos gerado pelo seu aplicativo autenticador.
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="twoFactorForm">
      <div class="form-group">
        <label>Código 2FA</label>
        <input type="text" id="code" placeholder="000000" maxlength="6">
      </div>

      <button type="submit" class="btn" id="btnVerify">Verificar</button>
    </form>

    <div class="footer">
      <a href="#" id="useBackup">Usar código de backup</a>
      <span class="divider">|</span>
      <a href="login.html">Voltar ao Login</a>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api/auth';

    const form = document.getElementById('twoFactorForm');
    const btnVerify = document.getElementById('btnVerify');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const backupLink = document.getElementById('useBackup');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const code = document.getElementById('code').value.trim();

      if (!code || code.length !== 6) {
        errorMessage.style.display = 'block';
        errorMessage.innerHTML = 'Digite um código válido de 6 dígitos';
        return;
      }

      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      btnVerify.disabled = true;
      btnVerify.innerHTML = '<span class="loading"></span> Verificando...';

      try {
        const response = await fetch(`${API_URL}/verify-2fa`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            code: code
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          successMessage.style.display = 'block';
          successMessage.innerHTML = 'Autenticação realizada com sucesso! Redirecionando...';
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 2000);
        } else {
          errorMessage.style.display = 'block';
          errorMessage.innerHTML = data.error || 'Código inválido';
        }
      } catch (error) {
        errorMessage.style.display = 'block';
        errorMessage.innerHTML = 'Erro de conexão com o servidor';
      } finally {
        btnVerify.disabled = false;
        btnVerify.innerHTML = 'Verificar';
      }
    });

    backupLink.addEventListener('click', function(e) {
      e.preventDefault();
      const infoDiv = document.querySelector('.info');
      infoDiv.innerHTML = 'Digite um dos seus códigos de backup.';
      document.getElementById('code').placeholder = 'Código de backup';
      backupLink.textContent = 'Usar código 2FA';
      backupLink.id = 'use2FA';

      document.getElementById('use2FA').addEventListener('click', function(e) {
        e.preventDefault();
        infoDiv.innerHTML = 'Digite o código de 6 dígitos gerado pelo seu aplicativo autenticador.';
        document.getElementById('code').placeholder = '000000';
        this.textContent = 'Usar código de backup';
        this.id = 'useBackup';
      });
    });
  </script>

</body>
</html>
