<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Trilha Acadêmica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/login.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2>Bem-vindo</h2>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@exemplo.com">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="********">
            </div>

            <button type="submit" class="btn" id="btnLogin">Entrar</button>
        </form>

        <div class="footer">
            <a href="cadastro.html">Criar conta</a>
            <span class="divider">|</span>
            <a href="recuperar.html">Esqueci minha senha</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/auth';

        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            if (!email || !senha) {
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = 'Preencha todos os campos';
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = 'Digite um email válido';
                return;
            }

            if (senha.length < 6) {
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = 'Senha deve ter no mínimo 6 caracteres';
                return;
            }

            errorMessage.style.display = 'none';
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="loading"></span> Entrando...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: senha })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'questionario.html';
                } else {
                    errorMessage.style.display = 'block';
                    errorMessage.innerHTML = data.error || 'Email ou senha inválidos';
                }
            } catch (error) {
                console.error('Erro:', error);
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = 'Erro de conexão com o servidor';
            } finally {
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Entrar';
            }
        });
    </script>

</body>
</html>
