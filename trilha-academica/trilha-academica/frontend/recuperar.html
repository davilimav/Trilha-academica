<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Trilha Acadêmica</title>
    <link rel="stylesheet" href="css/recuperar.css">
</head>
<body>
    <div class="container-recuperacao">
        <div class="cabecalho-recuperacao">
            <div class="icone-recuperacao">🔐</div>
            <h1>Recuperar Senha</h1>
            <p>Digite seu email cadastrado para receber instruções de recuperação.</p>
        </div>
        
        <div id="message" class="mensagem"></div>
        
        <form id="recuperarForm" class="formulario-recuperacao">
            <div class="grupo-formulario">
                <label for="email">Email cadastrado:</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="botao-primario">Enviar Instruções</button>
        </form>
        
        <div class="links">
            <a href="login.html">Voltar para Login</a>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('recuperarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            const result = await solicitarRecuperacao(email);
            
            const messageDiv = document.getElementById('message');
            if (result.success) {
                messageDiv.className = 'mensagem sucesso';
                messageDiv.textContent = result.message;
            } else {
                messageDiv.className = 'mensagem erro';
                messageDiv.textContent = result.error;
            }
        });
    </script>
</body>
</html>
